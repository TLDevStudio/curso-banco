<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Onda de Resultados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
        }

        .auth-box {
            background: var(--white);
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
            border-top: 4px solid var(--gold);
        }

        .auth-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--navy);
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .auth-logo span {
            color: var(--gold);
        }

        .auth-subtitle {
            text-align: center;
            font-size: 0.82rem;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .auth-field {
            margin-bottom: 1.2rem;
        }

        .auth-field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 0.4rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .auth-field input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--gray-light);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--navy);
            transition: border 0.2s;
            outline: none;
        }

        .auth-field input:focus {
            border-color: var(--gold);
        }

        .auth-btn {
            width: 100%;
            padding: 0.95rem;
            background: var(--gold);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .auth-btn:hover {
            background: var(--gold-dark);
        }

        .auth-btn:disabled {
            background: var(--gray-light);
            cursor: not-allowed;
        }

        .auth-erro {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-left: 3px solid #ef5350;
            border-radius: 4px;
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            color: #c62828;
            margin-bottom: 1rem;
            display: none;
        }

        .auth-link {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .auth-link a {
            color: var(--gold);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-box">
        <div class="auth-logo">Onda de <span>Resultados</span></div>
        <p class="auth-subtitle">Entre na sua conta para acessar as aulas</p>

        <div class="auth-erro" id="erroMsg"></div>

        <div class="auth-field">
            <label>Email</label>
            <input type="email" id="email" placeholder="seu@email.com" />
        </div>

        <div class="auth-field">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••" />
        </div>

        <button class="auth-btn" id="btnLogin" onclick="fazerLogin()">
            Entrar
        </button>

        <div class="auth-link">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Se já estiver logado, vai direto para área de membros
        if (api.estaLogado()) {
            window.location.href = '/curso-banco/pages/area-membros.html';
        }

        async function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnLogin');
            const erro = document.getElementById('erroMsg');

            if (!email || !senha) {
                erro.textContent = 'Preencha email e senha.';
                erro.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            erro.style.display = 'none';

            const res = await api.login(email, senha);

            if (res.erro) {
                erro.textContent = res.erro;
                erro.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Entrar';
                return;
            }

            api.salvarToken(res.token, res.nome);
            window.location.href = 'area-membros.html';
        }

        // Login com Enter
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
</body>

</html>
