<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Onda de Resultados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

    <nav class="admin-nav">
        <div class="admin-nav-logo">Onda de <span>Resultados</span></div>
        <div class="admin-nav-right">
            <span class="admin-badge">Painel Admin</span>
            <button class="admin-logout" onclick="sairAdmin()">Sair</button>
        </div>
    </nav>

    <!-- TELA DE LOGIN DO ADMIN -->
    <div class="admin-login-wrap" id="telaLogin">
        <div class="admin-login-box">
            <h2>Área Restrita</h2>
            <p>Digite a senha de administrador para continuar</p>
            <div class="admin-erro" id="adminErro"></div>
            <input type="password" class="admin-input" id="adminSenha" placeholder="Senha de admin" />
            <button class="admin-btn" onclick="entrarAdmin()">Entrar</button>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div class="admin-wrap" id="painelAdmin">

        <div class="admin-header">
            <h1 class="admin-title">Gerenciar Alunos</h1>
            <button class="admin-btn" style="width:auto;padding:0.6rem 1.4rem;" onclick="carregarAlunos()">
                ↻ Atualizar
            </button>
        </div>

        <div class="admin-stats">
            <div class="admin-stat">
                <div class="admin-stat-num" id="statTotal">—</div>
                <div class="admin-stat-label">Total de Alunos</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat-num" id="statPagos">—</div>
                <div class="admin-stat-label">Com Acesso</div>
            </div>
            <div class="admin-stat">
                <div class="admin-stat-num" id="statPendentes">—</div>
                <div class="admin-stat-label">Pendentes</div>
            </div>
        </div>

        <div class="admin-search">
            <input type="text" id="busca" placeholder="🔍 Buscar por nome ou email..." oninput="filtrarAlunos()" />
        </div>

        <div class="admin-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Cadastro</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaAlunos">
                    <tr>
                        <td colspan="5" class="admin-loading">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="../js/admin.js"></script>

</body>

</html>
